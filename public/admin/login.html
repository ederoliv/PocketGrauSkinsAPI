<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Pocket Grau Skins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0f14;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(22, 27, 39, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f97316;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0d0f14;
      border: 1px solid #1e2a40;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }

    input[type="password"]:focus {
      border-color: #f97316;
    }

    button[type="submit"] {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: #f97316;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    button[type="submit"]:hover { background: #ea6c0e; }
    button[type="submit"]:active { transform: scale(.98); }

    #msg {
      margin-top: 16px;
      font-size: 13px;
      color: #ef4444;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/admin/assets/logo.svg" alt="Pocket Grau Skins" style="width: 200px; max-width: 100%; margin-bottom: 8px;" />
      <p>Painel de Administração</p>
    </div>

    <form id="loginForm">
      <label for="senha">Senha de acesso</label>
      <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" required />
      <button type="submit" id="btnLogin">Entrar</button>
    </form>
    <p id="msg"></p>
  </div>

  <script>
    // Random background
    const bgImages = ['1.png', '2.png', '3.png', '4.png', '5.png'];
    const randomImg = bgImages[Math.floor(Math.random() * bgImages.length)];
    document.body.style.backgroundImage = `url('/admin/banners/${randomImg}')`;

    // Se já tem token, redireciona direto para o painel
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const msg = document.getElementById('msg');
      const senha = document.getElementById('senha').value;

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      msg.textContent = '';

      try {
        const res = await fetch('/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senha }),
        });

        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error ?? 'Erro ao fazer login.';
          return;
        }

        localStorage.setItem('admin_token', data.token);
        window.location.href = '/admin';
      } catch {
        msg.textContent = 'Erro de conexão com o servidor.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
