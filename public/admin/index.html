<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Pocket Grau Skins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161b27; --surface2: #1a2133;
      --border: #1e2a40; --accent: #f97316; --accent-h: #ea6c0e;
      --green: #22c55e; --green-h: #16a34a;
      --danger: #ef4444; --text: #e2e8f0; --muted: #64748b;
      --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .brand { font-size: 17px; font-weight: 700; color: var(--accent); }
    #btnLogout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; font-family: inherit;
      padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #btnLogout:hover { border-color: var(--danger); color: var(--danger); }

    /* MAIN */
    main { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .toolbar h1 { font-size: 20px; font-weight: 700; }

    .btn-add {
      display: flex; align-items: center; gap: 8px;
      background: var(--green); border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 600; font-family: inherit;
      padding: 10px 20px; cursor: pointer; transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--green-h); }
    .btn-add:active { transform: scale(.97); }

    /* TABLE */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    }
    td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .thumb {
      width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
      background: var(--surface2); display: block;
    }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 999px; text-transform: uppercase;
    }
    .badge-personagem { background: #1e3a5f; color: #60a5fa; }
    .badge-moto { background: #3b1f06; color: #fb923c; }

    .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; color: var(--muted);
    }
    .icon-btn.edit:hover  { border-color: #60a5fa; color: #60a5fa; background: rgba(96,165,250,.08); }
    .icon-btn.del:hover   { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,.08); }
    .icon-btn:disabled { opacity: .4; cursor: not-allowed; }

    .empty { text-align: center; padding: 56px 0; color: var(--muted); font-size: 14px; }

    /* SEARCH BAR */
    .search-wrap {
      margin-bottom: 16px;
      position: relative;
    }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 15px; pointer-events: none; opacity: .5;
    }
    #searchInput {
      width: 100%; padding: 10px 14px 10px 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--accent); }

    /* THUMBNAIL CLICKABLE */
    .thumb {
      width: 48px; height: 48px; border-radius: 8px; object-fit: cover;
      background: var(--surface2); display: block;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
    }
    .thumb:hover { transform: scale(1.08); box-shadow: 0 0 0 2px var(--accent); }

    /* CAROUSEL MODAL */
    .modal-carousel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px 24px;
      width: 100%; max-width: 560px;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      animation: up .22s ease;
    }
    .carousel-stage {
      position: relative; width: 100%; aspect-ratio: 16/9;
      border-radius: 12px; overflow: hidden;
      background: #000; margin-bottom: 14px;
    }
    .carousel-stage img {
      width: 100%; height: 100%; object-fit: contain;
      position: absolute; inset: 0;
      opacity: 0; transition: opacity .3s;
    }
    .carousel-stage img.active { opacity: 1; }
    .car-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.12);
      color: #fff; width: 38px; height: 38px; border-radius: 50%;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .2s; z-index: 2;
    }
    .car-btn:hover { background: rgba(249,115,22,.7); }
    .car-btn.prev { left: 10px; }
    .car-btn.next { right: 10px; }
    .car-dots {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 16px;
    }
    .car-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); cursor: pointer; transition: background .2s, transform .2s;
    }
    .car-dot.active { background: var(--accent); transform: scale(1.3); }
    .car-counter {
      text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 18px;
    }
    #carouselSkinName {
      font-size: 16px; font-weight: 700; margin-bottom: 4px;
    }

    /* ── OVERLAY MODAL BASE ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
      animation: up .22s ease;
    }
    @keyframes up { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: transparent; border: none; color: var(--muted);
      font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px;
      border-radius: 6px; transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 500; color: var(--muted);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 76px; }
    .form-group select option { background: var(--surface2); }

    .file-label {
      display: flex; flex-direction: column; align-items: center;
      border: 2px dashed var(--border); border-radius: 10px; padding: 16px;
      cursor: pointer; text-align: center; gap: 4px; transition: border-color .2s, background .2s;
    }
    .file-label:hover { border-color: var(--accent); background: rgba(249,115,22,.04); }
    .file-label span { font-size: 13px; color: var(--muted); }
    .file-label strong { font-size: 13px; }
    .file-label input[type="file"] { display: none; }
    .file-hint { font-size: 12px; color: var(--accent); margin-top: 5px; min-height: 16px; }

    .btn-submit {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .2s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--accent-h); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    /* PROGRESS MODAL */
    .step-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .step { display: flex; align-items: center; gap: 14px; font-size: 14px; }
    .step-icon {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      background: var(--surface2); border: 1px solid var(--border); transition: all .3s;
    }
    .step-icon.spin::after {
      content:''; display:block; width:16px; height:16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: rot .7s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
    .step-icon.done { background: rgba(34,197,94,.12); border-color: var(--green); }
    .step-icon.err  { background: rgba(239,68,68,.12);  border-color: var(--danger); }
    .step-text .lbl { font-weight: 500; }
    .step-text .st  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .step-text .st.ok  { color: var(--green); }
    .step-text .st.bad { color: var(--danger); }
    .prog-footer { margin-top: 28px; text-align: center; }
    #btnCloseProg {
      display: none; padding: 10px 32px; background: var(--accent);
      border: none; border-radius: 10px; color: #fff; font-size: 14px;
      font-weight: 600; font-family: inherit; cursor: pointer;
    }
    #btnCloseProg:hover { background: var(--accent-h); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px;
      font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-left: 3px solid var(--green); }
    #toast.err { border-left: 3px solid var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="brand">🏍️ Pocket Grau Skins <span style="font-weight:400;color:var(--muted);font-size:13px">— Admin</span></div>
  <button id="btnLogout">Sair</button>
</header>

<main>
  <div class="toolbar">
    <h1>Skins Cadastradas</h1>
    <button class="btn-add" id="btnAdicionar">＋ Adicionar</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nome ou descrição..." autocomplete="off" />
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th style="width:60px"></th>
          <th>Nome</th>
          <th>Tipo</th>
          <th>Banners</th>
          <th style="width:90px;text-align:right">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ── MODAL ADICIONAR / EDITAR ── -->
<div class="overlay" id="modalForm">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalFormTitle">Nova Skin</h2>
      <button class="modal-close" id="btnCloseForm">✕</button>
    </div>
    <form id="skinForm" novalidate>
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label for="nome">Nome *</label>
        <input type="text" id="nome" placeholder="Ex: Hugo Milgrau" required />
      </div>
      <div class="form-group">
        <label for="descricao">Descrição *</label>
        <textarea id="descricao" placeholder="Descreva a skin..." required></textarea>
      </div>
      <div class="form-group">
        <label for="tipo">Tipo *</label>
        <select id="tipo">
          <option value="PERSONAGEM">Personagem</option>
          <option value="MOTO">Moto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Banners <span id="bannersLabel" style="text-transform:none;font-size:11px">(até 4 imagens) *</span></label>
        <label class="file-label" for="banners">
          <span style="font-size:20px">🖼️</span>
          <strong>Escolher banners</strong>
          <span>JPG / PNG — até 4 arquivos</span>
          <input type="file" id="banners" accept="image/*" multiple />
        </label>
        <p class="file-hint" id="hintBanners"></p>
      </div>
      <div class="form-group">
        <label>Arquivo da Skin <span id="skinLabel" style="text-transform:none;font-size:11px">*</span></label>
        <label class="file-label" for="arquivoSkin">
          <span style="font-size:20px">📦</span>
          <strong>Escolher skin</strong>
          <span>PNG 500×500</span>
          <input type="file" id="arquivoSkin" accept="image/png" />
        </label>
        <p class="file-hint" id="hintSkin"></p>
      </div>
      <button type="submit" class="btn-submit" id="btnSubmit">Salvar</button>
    </form>
  </div>
</div>

<!-- ── MODAL PROGRESSO ── -->
<div class="overlay" id="modalProg">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h2 id="progTitle">Salvando skin...</h2></div>
    <ul class="step-list">
      <li class="step">
        <div class="step-icon" id="i-dados"></div>
        <div class="step-text"><div class="lbl">Dados da skin</div><div class="st" id="s-dados">Aguardando...</div></div>
      </li>
      <li class="step">
        <div class="step-icon" id="i-skin"></div>
        <div class="step-text"><div class="lbl">Arquivo da skin</div><div class="st" id="s-skin">Aguardando...</div></div>
      </li>
      <li class="step">
        <div class="step-icon" id="i-banners"></div>
        <div class="step-text"><div class="lbl">Banners</div><div class="st" id="s-banners">Aguardando...</div></div>
      </li>
    </ul>
    <div class="prog-footer"><button id="btnCloseProg">Fechar</button></div>
  </div>
</div>

<!-- ── MODAL CARROSSEL ── -->
<div class="overlay" id="modalCarousel">
  <div class="modal-carousel">
    <div class="modal-header">
      <div>
        <div id="carouselSkinName"></div>
        <div style="font-size:12px;color:var(--muted)" id="carouselSkinType"></div>
      </div>
      <button class="modal-close" id="btnCloseCarousel">✕</button>
    </div>
    <div class="carousel-stage" id="carouselStage">
      <!-- imgs injected by JS -->
      <button class="car-btn prev" id="carPrev">‹</button>
      <button class="car-btn next" id="carNext">›</button>
    </div>
    <div class="car-counter" id="carCounter"></div>
    <div class="car-dots" id="carDots"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── AUTH ────────────────────────────────────────────────────────────────
  const token = localStorage.getItem('admin_token');
  if (!token) location.href = '/admin/login';
  const H = () => ({ 'Authorization': `Bearer ${token}` });

  document.getElementById('btnLogout').onclick = () => {
    localStorage.removeItem('admin_token');
    location.href = '/admin/login';
  };

  // ── TOAST ───────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3500);
  }

  // ── ALL SKINS CACHE ──────────────────────────────────────────────────────
  let allSkins = [];

  // ── LOAD TABLE ──────────────────────────────────────────────────────────
  async function loadSkins() {
    const tbody = document.getElementById('tbody');
    try {
      const res = await fetch('/admin/skins', { headers: H() });
      if (res.status === 401) { location.href = '/admin/login'; return; }
      allSkins = await res.json();
      renderTable(allSkins);
    } catch { tbody.innerHTML = '<tr><td colspan="5" class="empty">Erro ao carregar.</td></tr>'; }
  }

  function renderTable(skins) {
    const tbody = document.getElementById('tbody');
    if (!skins.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhuma skin encontrada.</td></tr>';
      return;
    }
    tbody.innerHTML = skins.map(s => `
      <tr>
        <td><img class="thumb" src="${s.banners?.[0]??''}" alt="" onerror="this.style.opacity='.2'"
          onclick="openCarousel(${s.id})" title="Ver banners" /></td>
        <td style="font-weight:600">${esc(s.nome)}</td>
        <td><span class="badge badge-${s.tipo.toLowerCase()}">${s.tipo}</span></td>
        <td style="color:var(--muted)">${s.banners.length}</td>
        <td>
          <div class="actions">
            <button class="icon-btn edit" title="Editar" onclick="openEdit(${s.id})">✏️</button>
            <button class="icon-btn del"  title="Excluir" onclick="deleteSkin(${s.id},'${esc(s.nome)}',this)">🗑</button>
          </div>
        </td>
      </tr>`).join('');
  }

  // ── SEARCH ──────────────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    if (!q) { renderTable(allSkins); return; }
    const filtered = allSkins.filter(s =>
      s.nome.toLowerCase().includes(q) ||
      (s.descricao && s.descricao.toLowerCase().includes(q))
    );
    renderTable(filtered);
  });

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;'); }
  loadSkins();

  // ── MODAL FORM: ABRIR / FECHAR ──────────────────────────────────────────
  function openAdd() {
    document.getElementById('editId').value = '';
    document.getElementById('skinForm').reset();
    document.getElementById('hintBanners').textContent = '';
    document.getElementById('hintSkin').textContent = '';
    document.getElementById('modalFormTitle').textContent = 'Nova Skin';
    document.getElementById('btnSubmit').textContent = 'Cadastrar';
    document.getElementById('bannersLabel').textContent = '(até 4 imagens) *';
    document.getElementById('skinLabel').textContent = '*';
    document.getElementById('modalForm').classList.add('active');
  }

  async function openEdit(id) {
    const res = await fetch(`/skins/${id}`, { headers: H() });
    if (!res.ok) { toast('Erro ao carregar skin.', 'err'); return; }
    const s = await res.json();
    document.getElementById('editId').value = id;
    document.getElementById('nome').value = s.nome;
    document.getElementById('descricao').value = s.descricao;
    document.getElementById('tipo').value = s.tipo;
    document.getElementById('hintBanners').textContent = `Atual: ${s.banners.length} banner(s). Selecionar novos substituirá todos.`;
    document.getElementById('hintSkin').textContent = 'Atual: arquivo existente. Selecionar novo substituirá.';
    document.getElementById('modalFormTitle').textContent = 'Editar Skin';
    document.getElementById('btnSubmit').textContent = 'Salvar alterações';
    document.getElementById('bannersLabel').textContent = '(opcional — deixe vazio para manter)';
    document.getElementById('skinLabel').textContent = '(opcional — deixe vazio para manter)';
    document.getElementById('modalForm').classList.add('active');
  }

  function closeForm() { document.getElementById('modalForm').classList.remove('active'); }
  document.getElementById('btnCloseForm').onclick = closeForm;
  document.getElementById('btnAdicionar').onclick = openAdd;

  // ── FILE HINTS ──────────────────────────────────────────────────────────
  document.getElementById('banners').onchange = function () {
    const p = document.getElementById('hintBanners');
    p.textContent = this.files.length ? Array.from(this.files).map(f=>f.name).join(', ') : '';
  };
  document.getElementById('arquivoSkin').onchange = function () {
    document.getElementById('hintSkin').textContent = this.files[0]?.name ?? '';
  };

  // ── PROGRESS HELPERS ────────────────────────────────────────────────────
  function setStep(k, state, msg) {
    const ic = document.getElementById(`i-${k}`);
    const st = document.getElementById(`s-${k}`);
    ic.className = 'step-icon' + (state==='spin'?' spin': state==='done'?' done': state==='err'?' err':'');
    ic.textContent = state==='done'?'✅': state==='err'?'❌':'';
    st.className = 'st' + (state==='done'?' ok': state==='err'?' bad':'');
    st.textContent = msg;
  }
  function openProg(title) {
    ['dados','skin','banners'].forEach(k => setStep(k,'','Aguardando...'));
    document.getElementById('progTitle').textContent = title;
    document.getElementById('btnCloseProg').style.display = 'none';
    document.getElementById('modalProg').classList.add('active');
  }
  function closeProg() { document.getElementById('modalProg').classList.remove('active'); }
  document.getElementById('btnCloseProg').onclick = closeProg;

  const delay = ms => new Promise(r => setTimeout(r, ms));

  // ── FORM SUBMIT ─────────────────────────────────────────────────────────
  document.getElementById('skinForm').onsubmit = async (e) => {
    e.preventDefault();
    const id   = document.getElementById('editId').value;
    const nome = document.getElementById('nome').value.trim();
    const desc = document.getElementById('descricao').value.trim();
    const tipo = document.getElementById('tipo').value;
    const bEl  = document.getElementById('banners');
    const sEl  = document.getElementById('arquivoSkin');
    const isEdit = !!id;

    if (!nome || !desc) { toast('Preencha nome e descrição.', 'err'); return; }
    if (!isEdit && !bEl.files.length) { toast('Selecione pelo menos um banner.', 'err'); return; }
    if (!isEdit && !sEl.files.length) { toast('Selecione o arquivo da skin.', 'err'); return; }

    closeForm();
    openProg(isEdit ? 'Salvando alterações...' : 'Cadastrando skin...');

    setStep('dados','spin','Salvando dados...');
    await delay(350);
    setStep('skin','spin','Enviando arquivo...');
    await delay(250);
    setStep('banners','spin','Enviando banners...');

    const fd = new FormData();
    fd.append('nome', nome); fd.append('descricao', desc); fd.append('tipo', tipo);
    Array.from(bEl.files).forEach(f => fd.append('banners', f));
    if (sEl.files[0]) fd.append('arquivoSkin', sEl.files[0]);

    try {
      const url    = isEdit ? `/admin/skins/${id}` : '/admin/skins';
      const method = isEdit ? 'PUT' : 'POST';
      const res  = await fetch(url, { method, headers: H(), body: fd });
      const data = await res.json();

      if (!res.ok) {
        setStep('dados','err','Falha'); setStep('skin','err','Falha');
        setStep('banners','err', data.error ?? 'Erro desconhecido');
        document.getElementById('progTitle').textContent = 'Erro ao salvar';
      } else {
        setStep('dados','done','Dados salvos ✓');
        setStep('skin','done','Skin enviada ✓');
        setStep('banners','done','Banners enviados ✓');
        document.getElementById('progTitle').textContent = isEdit ? 'Skin atualizada! ✏️' : 'Skin cadastrada! 🎉';
        loadSkins();
      }
    } catch {
      setStep('dados','err','Falha'); setStep('skin','err','Falha');
      setStep('banners','err','Erro de conexão');
      document.getElementById('progTitle').textContent = 'Erro ao salvar';
    }
    document.getElementById('btnCloseProg').style.display = 'inline-block';
  };

  // ── DELETE ──────────────────────────────────────────────────────────────
  async function deleteSkin(id, nome, btn) {
    if (!confirm(`Remover "${nome}"? Esta ação não pode ser desfeita.`)) return;
    btn.disabled = true; btn.textContent = '⏳';
    try {
      const res = await fetch(`/admin/skins/${id}`, { method: 'DELETE', headers: H() });
      const data = await res.json();
      if (!res.ok) { toast(data.error ?? 'Erro ao remover.', 'err'); btn.disabled=false; btn.textContent='🗑'; return; }
      toast(`"${nome}" removida com sucesso.`);
      loadSkins();
    } catch { toast('Erro de conexão.','err'); btn.disabled=false; btn.textContent='🗑'; }
  }

  // ── CAROUSEL ─────────────────────────────────────────────────────────────
  let carIdx = 0;
  let carBanners = [];

  function openCarousel(id) {
    const skin = allSkins.find(s => s.id === id);
    if (!skin || !skin.banners?.length) { toast('Sem banners disponíveis.', 'err'); return; }

    carBanners = skin.banners;
    carIdx = 0;

    document.getElementById('carouselSkinName').textContent = skin.nome;
    document.getElementById('carouselSkinType').textContent = skin.tipo;

    // Build images
    const stage = document.getElementById('carouselStage');
    stage.querySelectorAll('img').forEach(el => el.remove());
    carBanners.forEach((url, i) => {
      const img = document.createElement('img');
      img.src = url;
      img.alt = `Banner ${i + 1}`;
      if (i === 0) img.classList.add('active');
      stage.prepend(img); // insert before buttons
    });
    // Correct order: prepend adds in reverse, fix:
    const imgs = stage.querySelectorAll('img');
    // Re-append in correct order
    carBanners.forEach((url, i) => { imgs[carBanners.length - 1 - i].remove(); });
    carBanners.forEach((url, i) => {
      const img = document.createElement('img');
      img.src = url; img.alt = `Banner ${i+1}`;
      if (i === 0) img.classList.add('active');
      stage.insertBefore(img, document.getElementById('carPrev'));
    });

    buildDots();
    updateCarousel();
    document.getElementById('modalCarousel').classList.add('active');
  }

  function buildDots() {
    const dots = document.getElementById('carDots');
    dots.innerHTML = '';
    carBanners.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'car-dot' + (i === 0 ? ' active' : '');
      d.onclick = () => { carIdx = i; updateCarousel(); };
      dots.appendChild(d);
    });
  }

  function updateCarousel() {
    const stage = document.getElementById('carouselStage');
    stage.querySelectorAll('img').forEach((img, i) => {
      img.classList.toggle('active', i === carIdx);
    });
    document.querySelectorAll('.car-dot').forEach((d, i) => {
      d.classList.toggle('active', i === carIdx);
    });
    const total = carBanners.length;
    document.getElementById('carCounter').textContent =
      total > 1 ? `${carIdx + 1} / ${total}` : '';
    document.getElementById('carPrev').style.display = total > 1 ? 'flex' : 'none';
    document.getElementById('carNext').style.display = total > 1 ? 'flex' : 'none';
  }

  document.getElementById('carPrev').onclick = () => {
    carIdx = (carIdx - 1 + carBanners.length) % carBanners.length;
    updateCarousel();
  };
  document.getElementById('carNext').onclick = () => {
    carIdx = (carIdx + 1) % carBanners.length;
    updateCarousel();
  };

  document.getElementById('btnCloseCarousel').onclick = () =>
    document.getElementById('modalCarousel').classList.remove('active');
  document.getElementById('modalCarousel').onclick = (e) => {
    if (e.target === document.getElementById('modalCarousel'))
      document.getElementById('modalCarousel').classList.remove('active');
  };

  // Keyboard navigation for carousel
  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('modalCarousel').classList.contains('active')) return;
    if (e.key === 'ArrowLeft') { carIdx = (carIdx - 1 + carBanners.length) % carBanners.length; updateCarousel(); }
    if (e.key === 'ArrowRight') { carIdx = (carIdx + 1) % carBanners.length; updateCarousel(); }
    if (e.key === 'Escape') document.getElementById('modalCarousel').classList.remove('active');
  });
</script>
</body>
</html>
